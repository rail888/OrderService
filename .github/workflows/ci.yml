name: Spring Boot Maven CI with Wrapper

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'corretto'

    - name: Grant mvnw permission
      run: chmod +x ./mvnw

    - name: Build with Maven Wrapper
      run: ./mvnw clean package -DskipTests

    - name: Upload JAR as artifact
      uses: actions/upload-artifact@v4
      with:
        name: order-service
        path: target/*.jar

    - name: Build Docker Image
      run: |
        echo "Building Docker image..."
        docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service:latest .
        echo "Docker image built"

    - name: Login to Docker Hub
      run: |
        echo "Logging in to Docker Hub..."
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        echo "Docker login successful"

    - name: Push Docker Image
      run: |
        echo "Pushing Docker image to Docker Hub..."
        docker push ${{ secrets.DOCKER_USERNAME }}/order-service:latest
        echo "Docker image push complete"
